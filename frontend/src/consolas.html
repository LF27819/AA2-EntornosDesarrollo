<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Consolas 🎮</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="module" src="./consolas.js"></script>
        <style> body { background-color: #ffe5e5; } </style>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarPrincipal">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./videojuegos.html">Videojuegos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./consolas.html">Consolas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./personajes.html">Personajes</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container py-5">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-danger">Gestión de consolas</h1>
                <p class="text-muted">Gestiona las consolas en las que están disponibles los juegos.</p>
            </div>

            <div class="card shadow-sm border-0 mb-5">
                <div class="card-header bg-danger text-white">
                    <h2 class="h5 mb-0">Formulario de consolas</h2>
                </div>
                <div class="card-body">
                    <form id="formConsola">
                        <input type="hidden" id="id_consola">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej. Nintendo Switch">
                            </div>

                            <div class="col-md-6">
                                <label for="fabricante" class="form-label">Fabricante</label>
                                <input type="text" class="form-control" id="fabricante" placeholder="Ej. Nintendo">
                            </div>

                            <div class="col-md-4">
                                <label for="fecha_lanzamiento" class="form-label">Año de lanzamiento</label>
                                <input type="text" class="form-control" id="fecha_lanzamiento" placeholder="Ej. 2017">
                            </div>

                            <div class="col-md-4">
                                <label for="precio" class="form-label">Precio</label>
                                <input type="number" step="0.01" class="form-control" id="precio" placeholder="Ej. 299.99">
                            </div>

                            <div class="col-md-4">
                                <label for="descontinuada" class="form-label">Descontinuada</label>
                                <select class="form-select" id="descontinuada">
                                    <option value="">Selecciona una opción</option>
                                    <option value="0">No</option>
                                    <option value="1">Sí</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-danger" id="btnGuardarConsola">Guardar consola</button>
                            <button type="button" class="btn btn-secondary" id="btnLimpiarConsola">Limpiar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h2 class="h5 mb-0 text-danger">Listado de consolas</h2>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fabricante</th>
                                <th>Fecha</th>
                                <th>Precio</th>
                                <th>Descontinuada</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="containerConsolas"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
