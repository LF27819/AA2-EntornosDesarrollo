<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Videojuegos🕹️</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="module" src="./videojuegos.js"></script>
        <style> body { background-color: #ffe5e5; } </style>
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarPrincipal">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./videojuegos.html">Videojuegos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./consolas.html">Consolas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./personajes.html">Personajes</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container py-5">
            <div class="text-center mb-5">
                <h1 class="fw-bold text-danger">Gestión de videojuegos</h1>
                <p class="text-muted">Consulta, registra, edita y elimina los videojuegos.</p>
            </div>

            <div class="card shadow-sm border-0 mb-5">
                <div class="card-header bg-danger text-white">
                    <h2 class="h5 mb-0">Formulario de videojuegos</h2>
                </div>
                <div class="card-body">
                    <form id="formVideojuego">
                        <input type="hidden" id="id_videojuego">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="titulo" class="form-label">Título</label>
                                <input type="text" class="form-control" id="titulo" placeholder="Ej. Super Mario Odyssey">
                            </div>

                            <div class="col-md-6">
                                <label for="anio" class="form-label">Año</label>
                                <input type="number" class="form-control" id="anio" placeholder="Ej. 2017">
                            </div>

                            <div class="col-md-6">
                                <label for="genero" class="form-label">Género</label>
                                <input type="text" class="form-control" id="genero" placeholder="Ej. Plataformas">
                            </div>

                            <div class="col-md-6">
                                <label for="id_consola" class="form-label">Consola</label>
                                <select class="form-select" id="id_consola">
                                    <option value="">Selecciona una consola</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="id_personaje" class="form-label">Personaje principal</label>
                                <select class="form-select" id="id_personaje">
                                    <option value="">Selecciona un personaje</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-danger" id="btnGuardarVideojuego">Guardar videojuego</button>
                            <button type="button" class="btn btn-secondary" id="btnLimpiarVideojuego">Limpiar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h2 class="h5 mb-0 text-danger">Listado de videojuegos</h2>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Año</th>
                                <th>Género</th>
                                <th>Consola</th>
                                <th>Personaje</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="containerVideojuegos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
